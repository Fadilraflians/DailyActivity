<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add New Task</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-container": "#a589f8",
                        "on-tertiary-container": "#230062",
                        "outline": "#747c80",
                        "on-secondary-fixed-variant": "#006947",
                        "on-tertiary-fixed": "#000000",
                        "inverse-surface": "#0b0f10",
                        "surface-container-highest": "#dce4e8",
                        "on-background": "#2c3437",
                        "primary-container": "#4388fd",
                        "surface-container-lowest": "#ffffff",
                        "on-error": "#fff7f6",
                        "primary-dim": "#004fad",
                        "surface-container-low": "#f0f4f7",
                        "tertiary-dim": "#5b3fa9",
                        "tertiary": "#684cb6",
                        "secondary": "#006d4a",
                        "surface-container": "#eaeff2",
                        "outline-variant": "#acb3b7",
                        "primary-fixed-dim": "#317bef",
                        "error": "#a83836",
                        "on-tertiary-fixed-variant": "#2e007c",
                        "on-secondary": "#e6ffee",
                        "secondary-container": "#6ffbbe",
                        "surface-tint": "#005bc4",
                        "on-tertiary": "#fdf7ff",
                        "secondary-fixed-dim": "#5fedb0",
                        "error-container": "#fa746f",
                        "on-error-container": "#6e0a12",
                        "tertiary-fixed": "#a589f8",
                        "on-surface": "#2c3437",
                        "primary-fixed": "#4388fd",
                        "secondary-fixed": "#6ffbbe",
                        "inverse-on-surface": "#9a9d9f",
                        "on-primary-fixed": "#000000",
                        "on-secondary-fixed": "#004930",
                        "on-secondary-container": "#005e3f",
                        "surface-variant": "#dce4e8",
                        "surface-bright": "#f7f9fb",
                        "inverse-primary": "#4d8eff",
                        "error-dim": "#67040d",
                        "background": "#f7f9fb",
                        "on-primary-container": "#000311",
                        "surface-container-high": "#e3e9ed",
                        "primary": "#005bc4",
                        "on-primary-fixed-variant": "#001435",
                        "surface": "#f7f9fb",
                        "on-surface-variant": "#596064",
                        "surface-dim": "#d4dbdf",
                        "tertiary-fixed-dim": "#987cea",
                        "on-primary": "#f9f8ff",
                        "secondary-dim": "#005f40"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Manrope"],
                        "label": ["Plus Jakarta Sans"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-input {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(8px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface min-h-screen pb-32">
<!-- Top Navigation Anchor (As sub-page, Shell is suppressed per "Destination Rule") -->
<header class="w-full pt-6 pb-2 px-6 flex justify-between items-center max-w-screen-xl mx-auto bg-surface">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-surface-container-low transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-on-surface" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline font-bold text-lg tracking-tight text-on-surface">New Task</h1>
<div class="w-10"></div> <!-- Spacer for symmetry -->
</header>
<main class="max-w-2xl mx-auto px-6 mt-8">
<!-- Editorial Header Section -->
<section class="mb-12">
<h2 class="font-headline text-[3.5rem] font-extralight leading-tight tracking-tighter text-on-surface mb-2">
                What's next,<br/><span class="font-bold text-primary">Julian?</span>
</h2>
<p class="font-label text-sm text-on-surface-variant tracking-wide uppercase opacity-60">Define your focus for today</p>
</section>
<!-- Task Form -->
<form class="space-y-10">
<!-- Title Input -->
<div class="relative">
<label class="absolute -top-3 left-0 font-label text-[10px] font-bold text-primary tracking-widest uppercase px-1" for="task-title">Task Title</label>
<input class="w-full pt-6 pb-2 bg-transparent border-0 border-b-2 border-surface-container-highest focus:border-primary focus:ring-0 text-2xl font-headline font-medium transition-all placeholder:text-on-surface-variant/30" id="task-title" placeholder="e.g. Design System Review" type="text"/>
</div>
<!-- Category Picker -->
<div class="space-y-4">
<span class="font-label text-[10px] font-bold text-on-surface-variant tracking-widest uppercase opacity-60">Category</span>
<div class="flex flex-wrap gap-3">
<button class="px-5 py-2.5 rounded-full bg-secondary-container text-on-secondary-container font-label text-xs font-semibold active:scale-95 transition-transform" type="button">
                        Work
                    </button>
<button class="px-5 py-2.5 rounded-full bg-surface-container-low text-on-surface-variant font-label text-xs font-medium hover:bg-surface-container-high transition-colors active:scale-95" type="button">
                        Personal
                    </button>
<button class="px-5 py-2.5 rounded-full bg-surface-container-low text-on-surface-variant font-label text-xs font-medium hover:bg-surface-container-high transition-colors active:scale-95" type="button">
                        Health
                    </button>
<button class="px-5 py-2.5 rounded-full bg-tertiary-container text-on-tertiary-container font-label text-xs font-semibold active:scale-95 transition-transform" type="button">
                        Urgent
                    </button>
<button class="w-10 h-10 flex items-center justify-center rounded-full border border-dashed border-outline-variant text-on-surface-variant hover:border-primary hover:text-primary transition-all" type="button">
<span class="material-symbols-outlined text-sm" data-icon="add">add</span>
</button>
</div>
</div>
<!-- Date and Time Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
<!-- Date Field -->
<div class="glass-input p-5 rounded-xl border border-outline-variant/15 flex items-center gap-4 group hover:border-primary/30 transition-colors">
<div class="w-12 h-12 bg-surface-container-highest rounded-lg flex items-center justify-center text-primary group-hover:bg-primary-container/20 transition-colors">
<span class="material-symbols-outlined" data-icon="calendar_today">calendar_today</span>
</div>
<div class="flex flex-col">
<span class="font-label text-[10px] font-bold text-on-surface-variant tracking-widest uppercase opacity-60">Date</span>
<input class="bg-transparent border-none p-0 font-headline font-semibold text-on-surface focus:ring-0" type="text" value="Today, 24 Oct"/>
</div>
</div>
<!-- Time Field -->
<div class="glass-input p-5 rounded-xl border border-outline-variant/15 flex items-center gap-4 group hover:border-primary/30 transition-colors">
<div class="w-12 h-12 bg-surface-container-highest rounded-lg flex items-center justify-center text-primary group-hover:bg-primary-container/20 transition-colors">
<span class="material-symbols-outlined" data-icon="schedule">schedule</span>
</div>
<div class="flex flex-col">
<span class="font-label text-[10px] font-bold text-on-surface-variant tracking-widest uppercase opacity-60">Time</span>
<input class="bg-transparent border-none p-0 font-headline font-semibold text-on-surface focus:ring-0" type="text" value="09:00 AM"/>
</div>
</div>
</div>
<!-- Visual Context Card (Bento-style) -->
<div class="grid grid-cols-4 gap-4 mt-8">
<div class="col-span-4 md:col-span-3 h-48 rounded-xl relative overflow-hidden bg-surface-container-low group">
<img alt="Task illustration" class="w-full h-full object-cover opacity-80 group-hover:scale-105 transition-transform duration-700" data-alt="overhead shot of a clean minimal workspace with a notepad, a pen, and a laptop on a white desk in soft natural daylight" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDegirs63k_DY1Dgzv4zX1glevCragAgb7CfWhF78oguvuLVmiofB_WrDM5MF1ER76OvwWQu2iqlb6UWtIzZVhi0dhtjexvIYmNS3CAs7PLM7WALAzhbbBT3O2NCVcsbjuQzTjEuDTLqkaxIv_r7ghCT1TdS1nryW9X9GgjH4vDWv5trUYjSoJAMDm5upY_birnwtqW7-R-EpRV89HwdzcKZ2N_qpxKmb08n7y7hIjBgmasMQ0nXJFwGxQoV3ZqvgXZ1jQepAqqvko"/>
<div class="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent"></div>
<div class="absolute bottom-4 left-4 text-white">
<p class="font-label text-[10px] font-medium tracking-widest uppercase opacity-80">Workspace Insight</p>
<p class="font-headline font-semibold text-lg">Focus on clarity today.</p>
</div>
</div>
<div class="hidden md:flex flex-col justify-center items-center h-48 rounded-xl bg-primary-container text-white p-6 text-center space-y-2">
<span class="material-symbols-outlined text-3xl" data-icon="verified" data-weight="fill">verified</span>
<p class="font-label text-xs font-semibold leading-tight">3 Tasks already completed today!</p>
</div>
</div>
<!-- Form Actions -->
<div class="fixed bottom-0 left-0 w-full px-6 pb-10 pt-6 bg-surface/80 backdrop-blur-xl flex flex-col items-center gap-4">
<button class="w-full max-w-lg bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-bold py-5 rounded-full shadow-[0_8px_32px_rgba(0,91,196,0.2)] active:scale-95 transition-all duration-200" type="submit">
                    Create Task
                </button>
<p class="font-label text-[10px] text-on-surface-variant/60 font-medium tracking-wider">Estimated focus duration: 45 mins</p>
</div>
</form>
</main>
</body></html>
